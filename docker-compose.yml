services:
  backend:
    build:
      context: ./backend
    container_name: maiquel-backend
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: maiquel-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
